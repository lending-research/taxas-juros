*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1a1a18;--text2:#5a5a56;--text3:#9a9a94;--nu:#7F77DD;--nu-light:#EEEDFE;--nu-dark:#534AB7;--r:12px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.25rem 2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10}
.logo{width:34px;height:34px;background:var(--nu);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.ht{font-size:14px;font-weight:500}.hs{font-size:11px;color:var(--text3);margin-top:1px}
.hb{margin-left:auto;font-size:11px;font-weight:500;padding:3px 10px;background:var(--nu-light);color:var(--nu-dark);border-radius:20px;white-space:nowrap}
.mtabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex}

.mtab:hover{color:var(--text2)}.mtab.active{color:var(--nu-dark);border-bottom-color:var(--nu)}
main{max-width:960px;margin:0 auto;padding:1.75rem 1.5rem}
.panel{display:none}.panel.active{display:block}
.hero{margin-bottom:1.5rem}
.hero h2{font-size:22px;font-weight:600;letter-spacing:-0.02em;line-height:1.3}
.hero p{font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.6}
.ptabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.ptab{font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.ptab:hover{background:var(--surface2)}.ptab.active{background:var(--text);color:#fff;border-color:var(--text)}
.mgrid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-bottom:1.5rem}

.mv{font-size:24px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-0.02em}
.ms{font-size:10px;color:var(--text3);margin-top:3px}
.mb{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;margin-top:5px}
.bnu{background:var(--nu-light);color:var(--nu-dark)}.bwarn{background:#FFF3E0;color:#B45309}.bdanger{background:#FFEBEE;color:#C62828}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.25rem}
.ct{font-size:14px;font-weight:500;margin-bottom:2px}.cs{font-size:12px;color:var(--text3);margin-bottom:1.25rem}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cw{position:relative;width:100%;height:280px}
.bar-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border)}
.bar-row:last-child{border-bottom:none}
.bar-pos{font-size:11px;color:var(--text3);width:24px;text-align:right;font-family:'DM Mono',monospace;flex-shrink:0}
.bar-badge{width:64px;flex-shrink:0}
.bar-badge-pill{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;white-space:nowrap}
.b-nu{background:var(--nu-light);color:var(--nu-dark)}.b-ahead{background:#E8F5E9;color:#2E7D32}.b-trad{background:var(--surface2);color:var(--text3)}
.bar-name{font-size:13px;font-weight:500;flex:1;min-width:0}
.bar-name.nu{color:var(--nu-dark)}
.bar-track{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;max-width:200px;flex-shrink:0}
.bar-fill{height:100%;border-radius:4px}
.bar-val{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;width:52px;text-align:right;flex-shrink:0}
.bar-ano{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;width:64px;text-align:right;flex-shrink:0}
@media(max-width:600px){.bar-track,.bar-ano{display:none}}
.nu-highlight{background:linear-gradient(90deg,#EEEDFE33,transparent);border-radius:6px}

.insight strong{font-weight:600}
.source{font-size:11px;color:var(--text3);margin-top:1.5rem;text-align:center;line-height:1.8}
.source a{color:var(--text3)}

function toAnn(m){return((Math.pow(1+m/100,12)-1)*100);}
function avg(arr,idxs){var v=idxs.map(function(i){return arr[i];}).filter(function(x){return x!=null;});return v.length?v.reduce(function(a,b){return a+b;},0)/v.length:null;}

function renderPubMetrics(period){
  var m=PUBLICO,idxs=m.periods[period].idx,nuA=avg(m.raw['Nubank'],idxs);
  var trad=['Nubank','Bradesco','Santander','Caixa','Ita\u00fa','Banco do Brasil'];
  return trad.map(function(name){
    var a=avg(m.raw[name],idxs);if(a==null)return'';
    var diff=name!='Nubank'&&nuA?'+'+(a-nuA).toFixed(2)+' p.p. vs Nu':null;
    var cls=name=='Nubank'?'bnu':(a-nuA>0.2?'bdanger':'bwarn');
    return'<div class="mc"><div class="ml">'+name+'</div><div class="mv">'+a.toFixed(2)+'%</div><div class="ms">ao m\u00eas</div>'+(diff?'<div class="mb '+cls+'">'+diff+'</div>':'')+'</div>';
  }).join('');
}

function renderPubRanking(period){
  var m=PUBLICO,idxs=m.periods[period].idx;
  var ranked=m.banks.map(function(b){return{key:b.key,color:b.color,isNubank:b.isNubank,ahead:b.ahead,avg:avg(m.raw[b.key],idxs)};}).filter(function(b){return b.avg!=null;}).sort(function(a,b){return a.avg-b.avg;});
  var mn=ranked[0].avg,mx=ranked[ranked.length-1].avg,rng=mx-mn;
  var nuPos=ranked.findIndex(function(b){return b.isNubank;})+1;
  var ahead=ranked.filter(function(b,i){return i<nuPos-1;}).map(function(b){return b.key;}).join(', ');
  var rows=ranked.map(function(b,i){
    var pct=rng>0?(b.avg-mn)/rng:0,bw=Math.round(10+pct*88);
    var pill=b.isNubank?'<span class="bar-badge-pill b-nu">Nubank \u2605</span>':b.ahead?'<span class="bar-badge-pill b-ahead">\u00e0 frente</span>':'<span class="bar-badge-pill b-trad">trad.</span>';
    return'<div class="bar-row'+(b.isNubank?' nu-highlight':'')+'"><span class="bar-pos">#'+(i+1)+'</span><span class="bar-badge">'+pill+'</span><span class="bar-name'+(b.isNubank?' nu':'')+'">'+b.key+'</span><div class="bar-track"><div class="bar-fill" style="width:'+bw+'%;background:'+b.color+(b.isNubank?'':'99')+'"></div></div><span class="bar-val">'+b.avg.toFixed(2)+'%</span><span class="bar-ano">'+toAnn(b.avg).toFixed(1)+'% a.a.</span></div>';
  }).join('');
  var nu=avg(m.raw['Nubank'],idxs),bb=avg(m.raw['Banco do Brasil'],idxs),cx=avg(m.raw['Caixa'],idxs);
  var ins='<strong>'+m.periods[period].label+':</strong> Nubank em <strong>#'+nuPos+'\u00balugar</strong> com m\u00e9dia de <strong>'+nu.toFixed(2)+'% a.m.</strong>';
  if(ahead)ins+=' \u00c0 sua frente: '+ahead+'.';
  if(cx)ins+=' Caixa cobra '+(cx-nu).toFixed(2)+' p.p. a mais.';
  if(bb)ins+=' Banco do Brasil cobra '+(bb-nu).toFixed(2)+' p.p. a mais (~'+(toAnn(bb)-toAnn(nu)).toFixed(1)+' p.p. ao ano).';
  return{rows:rows,rankSub:m.periods[period].label+' \u2014 menor taxa = mais competitivo',ins:ins};
}

  if(ahead)ins+=' \u00c0 sua frente: '+ahead+'.';
  if(bbRow&&nuRate)ins+=' Banco do Brasil cobra '+(bbRow.rate-nuRate).toFixed(2)+' p.p. a mais (~'+(toAnn(bbRow.rate)-toAnn(nuRate)).toFixed(1)+' p.p. ao ano).';
  var noteText=key=='inss'?'Dados semanais do Bacen':'Dados semanais \u00b7 taxas no privado s\u00e3o maiores';
  document.getElementById('metrics-'+key).innerHTML=cards;
  document.getElementById('bars-'+key).innerHTML=barRows;
  document.getElementById('rank-sub-'+key).textContent=totalPlayers+' institui\u00e7\u00f5es \u00b7 '+noteText;
  document.getElementById('ins-'+key).innerHTML=ins;
  document.querySelectorAll('#ptabs-'+key+' .ptab').forEach(function(t){t.classList.remove('active');});
  var tab=document.querySelector('#ptabs-'+key+' [data-period="'+period+'"]');
  if(tab)tab.classList.add('active');
}

function initMonthly(key,data){
  var label=key=='inss'?'Consignado INSS':'Consignado Privado';
  var ptabs=Object.entries(data.periods).map(function(e){var pk=e[0],pv=e[1];return'<button class="ptab" data-period="'+pk+'" onclick="buildMonthly(\''+key+'\','+key.toUpperCase()+',\''+pk+'\')">'+pv.label+'</button>';}).join('');
  document.getElementById('p-'+key).innerHTML='<div class="hero"><h2>Onde o Nubank se posiciona no '+label.toLowerCase()+'?</h2><p>Dados do Bacen \u00b7 Prefixado \u00b7 Pessoa F\u00edsica</p></div><div class="ptabs" id="ptabs-'+key+'">'+ptabs+'</div><div class="mgrid" id="metrics-'+key+'"></div><div class="card"><div class="ct">Ranking de taxas</div><div class="cs" id="rank-sub-'+key+'"></div><div id="bars-'+key+'"></div></div><div class="insight" id="ins-'+key+'"></div>';
  buildMonthly(key,data,data.defaultPeriod);
}

var initialized={};
function showModal(key,el){
  document.querySelectorAll('.mtab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('p-'+key).classList.add('active');
  if(!initialized[key]){initialized[key]=true;if(key=='publico')initPublico();else if(key=='inss')initMonthly('inss',INSS);else if(key=='privado')initMonthly('privado',PRIVADO);}
}
initPublico();
initialized['publico']=true;

</script>
</body>
</html>
